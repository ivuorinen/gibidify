---
name: Security Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run security scan weekly on Sundays at 00:00 UTC
    - cron: "0 0 * * 0"

permissions: {}

jobs:
  security:
    name: Security Analysis
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: ./.github/actions/setup
        with:
          token: ${{ github.token }}

      # Security Scanning with gosec
      # Using go run instead of the Docker action so the runner's Go toolchain
      # (set up above) is used — the gosec Docker image ships an older Go and
      # cannot analyse go 1.26+ modules with GOTOOLCHAIN=local.
      - name: Run gosec Security Scanner
        run: |
          # renovate: datasource=go depName=github.com/securego/gosec/v2/cmd/gosec
          go run github.com/securego/gosec/v2/cmd/gosec@v2.26.1 \
            -fmt sarif -out gosec-results.sarif ./...

      - name: Upload gosec results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always()
        with:
          sarif_file: gosec-results.sarif

      # Dependency Vulnerability Scanning
      # Parse SARIF output with jq, not the -json stream with grep:
      # govulncheck -json emits an `osv` advisory body for every known
      # vuln in any imported module regardless of reachability, so
      # grepping "osv" is a false positive. SARIF results in
      # runs[].results[] carry a `level` — "error" mirrors what the
      # govulncheck CLI counts as a failing (called/reachable) finding.
      # Ref: golang.org/x/vuln/internal/sarif.
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -format sarif ./... > govulncheck-results.sarif

      - name: Parse govulncheck results
        run: |
          if [ ! -s govulncheck-results.sarif ]; then
            echo "::error::govulncheck produced no SARIF output"
            exit 1
          fi

          called=$(jq '[.runs[].results[]? | select(.level == "error")] | length' govulncheck-results.sarif)
          informational=$(jq '[.runs[].results[]? | select(.level != "error")] | length' govulncheck-results.sarif)

          echo "Called (reachable) vulnerabilities: $called"
          echo "Informational findings (imported/required, not called): $informational"

          if [ "$called" -gt 0 ]; then
            echo "::error::Reachable vulnerabilities found in dependencies"
            jq -r '.runs[].results[]?
                   | select(.level == "error")
                   | "::error::\(.ruleId): \(.message.text)"' \
              govulncheck-results.sarif
            exit 1
          fi

      # Additional Security Linting
      - name: Run security-focused golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          # renovate: datasource=go depName=github.com/golangci/golangci-lint/v2/cmd/golangci-lint
          version: v2.12.2
          args: "--timeout=5m"

      # Makefile Linting
      - name: Run checkmake on Makefile
        uses: Uno-Takashi/checkmake-action@bc11ee86274ceaf5710dbcd80871d7cd7ecc78ce # v2
        with:
          config: .checkmake

      # Shell Script Formatting Check
      - name: Check shell script formatting
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          shfmt -d .

      - name: Run YAML linting
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1
        with:
          file_or_dir: .
          strict: true

      # Docker Security (if Dockerfile exists)
      - name: Run Docker security scan
        if: hashFiles('Dockerfile') != ''
        run: |
          docker run --rm -v "$PWD":/workspace \
            aquasec/trivy:latest fs --security-checks vuln,config /workspace/Dockerfile || true

      # Upload artifacts for review
      - name: Upload security scan results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: security-scan-results
          path: |
            gosec-results.sarif
            govulncheck-results.sarif
          retention-days: 30
